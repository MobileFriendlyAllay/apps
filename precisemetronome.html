<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision Metronome & Tuner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Use Tailwind's manual class mode for theme switching
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    screens: {
                        // Expanded range: covers 4:3 (1.33) all the way up to just before 16:9 (1.77)
                        'aspect-mid': { 'raw': '(min-aspect-ratio: 1.25/1)' }
                    }
                }
            }
        };

        // Initialize theme
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        })();
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .neo-button {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .neo-button:active {
            transform: scale(0.95);
        }

        .visualizer-dot {
            transition: transform 0.1s ease-out, background-color 0.1s;
        }

        /* Metronome Animations */
        .active-beat {
            transform: scale(1.2);
            background-color: #38bdf8 !important;
            box-shadow: 0 0 20px #38bdf8;
        }
        
        .active-accent {
            transform: scale(1.4);
            background-color: #f43f5e !important;
            box-shadow: 0 0 25px #f43f5e;
        }

        .active-subdivision {
            transform: scale(1.1);
            background-color: #94a3b8 !important;
        }

        .flash-beat {
            animation: flashBlue 0.15s ease-out forwards;
        }
        
        .flash-accent {
            animation: flashRed 0.15s ease-out forwards;
        }

        @keyframes flashBlue {
            0% { background-color: #38bdf8; box-shadow: 0 0 20px #38bdf8; }
            100% { background-color: transparent; box-shadow: none; }
        }

        @keyframes flashRed {
            0% { background-color: #f43f5e; box-shadow: 0 0 25px #f43f5e; }
            100% { background-color: transparent; box-shadow: none; }
        }

        /* Tuner Visuals */
        .tuner-gauge-bg {
            width: 200px;
            height: 100px;
            border-top-left-radius: 110px;
            border-top-right-radius: 110px;
            border: 4px solid currentColor;
            border-bottom: 0;
            position: relative;
        }

        .tuner-needle {
            transition: transform 0.15s ease-out;
            transform-origin: bottom center;
            bottom: 0;
            left: 50%;
            height: 80px;
            width: 3px;
            margin-left: -1.5px;
            z-index: 10;
        }

        .center-pin {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            position: absolute;
            bottom: -5px;
            left: 50%;
            margin-left: -5px;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        .tab-active {
            color: #38bdf8;
            border-bottom: 2px solid #38bdf8;
        }

        /* Mid-Aspect (Tablet/Square Monitor) Optimization */
        @media (min-aspect-ratio: 1.25/1) {
            .app-container {
                max-width: 95vw;
                padding: 2rem !important;
            }
            .bpm-text {
                font-size: clamp(6rem, 15vw, 10rem) !important;
            }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start py-8 px-4 md:px-8 bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 overflow-y-auto">

    <div class="app-container my-auto bg-white dark:bg-slate-800/50 p-6 md:p-10 rounded-3xl shadow-2xl border border-slate-200 dark:border-slate-700 w-full max-w-md lg:max-w-5xl aspect-mid:max-w-5xl backdrop-blur-sm transition-all duration-500 relative">
        
        <button id="theme-toggle" class="absolute top-6 right-6 p-2 rounded-xl bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 transition-all flex items-center justify-center w-10 h-10 shadow-sm border border-slate-200 dark:border-slate-600">
            <svg class="w-5 h-5 hidden dark:block text-yellow-400" fill="currentColor" viewBox="0 0 20 20">
                <path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"></path>
            </svg>
            <svg class="w-5 h-5 block dark:hidden text-slate-700" fill="currentColor" viewBox="0 0 20 20">
                <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
            </svg>
        </button>

        <div class="flex justify-around mb-8 border-b border-slate-200 dark:border-slate-700">
            <button id="tab-metronome" class="pb-2 px-4 font-bold uppercase text-sm tracking-widest tab-active transition-colors">Metronome</button>
            <button id="tab-tuner" class="pb-2 px-4 font-bold uppercase text-sm tracking-widest text-slate-400 dark:text-slate-500 hover:text-sky-500 transition-colors">Tuner</button>
        </div>

        <div id="section-metronome" class="grid grid-cols-1 lg:grid-cols-2 aspect-mid:grid-cols-2 gap-8 lg:gap-16 aspect-mid:gap-12">
            <div class="flex flex-col justify-center">
                <h1 class="text-center lg:text-left aspect-mid:text-left text-slate-500 dark:text-slate-400 font-semibold tracking-widest uppercase text-xs mb-4">Tempo Control</h1>
                <div class="text-center lg:text-left aspect-mid:text-left mb-8 relative group">
                    <input type="number" id="bpm-input" value="120" min="40" max="240" class="bpm-sync bpm-text w-full bg-transparent text-8xl md:text-9xl font-800 tracking-tighter text-slate-900 dark:text-white text-center lg:text-left aspect-mid:text-left focus:outline-none focus:ring-2 focus:ring-sky-500/20 rounded-2xl transition-all">
                    <div class="text-slate-400 dark:text-slate-500 font-medium mt-2">BPM (40 - 240)</div>
                </div>
                <div id="visualizer" class="flex justify-center lg:justify-start aspect-mid:justify-start gap-4 mb-10 h-12 items-center"></div>
            </div>

            <div class="space-y-6 flex flex-col justify-center">
                <input type="range" id="bpm-slider" min="40" max="240" value="120" class="w-full h-3 bg-slate-200 dark:bg-slate-700 rounded-lg appearance-none cursor-pointer accent-sky-500">
                <div class="flex items-center justify-between gap-4">
                    <button id="minus-btn" class="neo-button bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 p-5 rounded-2xl flex-1 text-2xl font-bold">-</button>
                    <button id="plus-btn" class="neo-button bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 p-5 rounded-2xl flex-1 text-2xl font-bold">+</button>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col gap-2">
                        <label class="text-slate-400 text-xs uppercase font-bold text-center lg:text-left aspect-mid:text-left">Signature</label>
                        <select id="time-sig" class="bg-slate-100 dark:bg-slate-700 border-none rounded-xl px-4 py-3 text-slate-900 dark:text-white focus:ring-2 focus:ring-sky-500 outline-none cursor-pointer">
                            <option value="1">1/4</option>
                            <option value="2">2/4</option>
                            <option value="3">3/4</option>
                            <option value="4" selected>4/4</option>
                            <option value="5">5/4</option>
                            <option value="6">6/8</option>
                        </select>
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-slate-400 text-xs uppercase font-bold text-center lg:text-left aspect-mid:text-left">Subdivision</label>
                        <select id="subdivision" class="bg-slate-100 dark:bg-slate-700 border-none rounded-xl px-4 py-3 text-slate-900 dark:text-white focus:ring-2 focus:ring-sky-500 outline-none cursor-pointer">
                            <option value="1">None (1)</option>
                            <option value="2">8th (2)</option>
                            <option value="3">Triplets (3)</option>
                            <option value="4">16th (4)</option>
                        </select>
                    </div>
                </div>
                <button id="start-stop" class="metro-toggle w-full py-6 rounded-2xl bg-sky-500 hover:bg-sky-400 text-slate-900 font-800 text-xl uppercase tracking-widest transition-colors shadow-lg shadow-sky-500/20">Start</button>
            </div>
        </div>

        <div id="section-tuner" class="hidden grid grid-cols-1 lg:grid-cols-2 aspect-mid:grid-cols-2 gap-8 lg:gap-12">
            <div class="relative flex flex-col items-center justify-center py-10 bg-slate-50 dark:bg-slate-900/50 rounded-3xl border border-slate-200 dark:border-slate-700/50 overflow-hidden">
                <div class="absolute top-4 left-4 flex items-center gap-1 bg-white dark:bg-slate-800/80 px-3 py-1.5 rounded-lg border border-slate-200 dark:border-slate-700 shadow-sm">
                    <span class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase">Ref:</span>
                    <button id="calib-minus" class="text-sky-500 hover:text-sky-400 font-bold text-sm px-1">-</button>
                    <input type="number" id="calib-input" value="440" min="430" max="450" class="text-xs font-bold text-slate-900 dark:text-white bg-transparent w-8 text-center focus:outline-none focus:ring-1 focus:ring-sky-500/50 rounded">
                    <span class="text-[10px] font-bold text-slate-400 dark:text-slate-500">Hz</span>
                    <button id="calib-plus" class="text-sky-500 hover:text-sky-400 font-bold text-sm px-1">+</button>
                </div>

                <div class="mb-6 scale-90 md:scale-100 aspect-mid:scale-110">
                    <div class="tuner-gauge-bg text-slate-200 dark:text-slate-700 scale-125 lg:scale-150 transform">
                        <div class="absolute inset-0 flex items-end justify-center">
                            <div class="w-1 h-3 bg-slate-300 dark:bg-slate-600 absolute left-[10%] bottom-0 transform -rotate-45 origin-bottom"></div>
                            <div class="w-1 h-3 bg-slate-300 dark:bg-slate-600 absolute left-[30%] bottom-0 transform -rotate-25 origin-bottom"></div>
                            <div class="w-1.5 h-4 bg-sky-500/30 absolute left-1/2 bottom-0 -ml-0.75 origin-bottom"></div>
                            <div class="w-1 h-3 bg-slate-300 dark:bg-slate-600 absolute right-[30%] bottom-0 transform rotate-25 origin-bottom"></div>
                            <div class="w-1 h-3 bg-slate-300 dark:bg-slate-600 absolute right-[10%] bottom-0 transform rotate-45 origin-bottom"></div>
                        </div>
                        <div id="tuner-needle" class="tuner-needle absolute bg-sky-500 rounded-full shadow-[0_0_10px_#0ea5e9]"></div>
                        <div class="center-pin bg-slate-400 dark:bg-slate-600"></div>
                    </div>
                </div>
                <div id="tuner-note" class="text-7xl md:text-9xl font-800 text-slate-900 dark:text-white h-24 flex items-center mt-4">--</div>
                <div id="tuner-freq" class="text-slate-400 dark:text-slate-500 font-medium text-lg">0.00 Hz</div>
            </div>

            <div class="flex flex-col justify-center space-y-6">
                <div class="flex flex-col gap-4">
                    <label class="text-slate-400 text-xs uppercase font-bold">Instrument Key</label>
                    <select id="transposition" class="w-full bg-slate-100 dark:bg-slate-700 border-none rounded-2xl px-6 py-4 text-sky-600 dark:text-sky-400 font-bold text-lg focus:ring-2 focus:ring-sky-500 outline-none cursor-pointer uppercase">
                        <option value="0">Concert (C)</option>
                        <option value="2">Bb (Trumpet/Clari)</option>
                        <option value="9">Eb (Alto Sax)</option>
                        <option value="7">F (Horn)</option>
                        <option value="10">G (Alto Flute)</option>
                    </select>
                </div>
                <div class="flex justify-between items-center p-4 bg-slate-100 dark:bg-slate-700/30 rounded-2xl border border-slate-200 dark:border-slate-700/50">
                    <span class="text-xs font-bold text-slate-400 uppercase">Accidentals</span>
                    <div class="flex bg-slate-200 dark:bg-slate-800 rounded-xl p-1 font-bold uppercase text-xs">
                        <button id="toggle-flats" class="px-4 py-2 rounded-lg bg-sky-500 text-slate-900 transition-all">b</button>
                        <button id="toggle-sharps" class="px-4 py-2 rounded-lg text-slate-400 dark:text-slate-500 hover:text-slate-900 dark:hover:text-white transition-all">#</button>
                    </div>
                </div>
                <div class="bg-slate-100 dark:bg-slate-700/30 p-6 rounded-2xl border border-slate-200 dark:border-slate-700/50 space-y-4">
                    <div class="flex items-center justify-between">
                        <span class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase">Metronome</span>
                        <input type="number" id="tuner-bpm-input" value="120" min="40" max="240" class="bpm-sync bg-white dark:bg-slate-800 text-sky-600 dark:text-sky-400 font-bold text-xl w-20 py-1 text-center rounded-lg outline-none border border-slate-200 dark:border-transparent">
                    </div>
                    <button id="start-stop-tuner" class="metro-toggle w-full py-4 rounded-xl bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 text-slate-700 dark:text-white font-bold text-sm uppercase tracking-widest transition-colors">Start Metronome</button>
                </div>
                <p id="tuner-status" class="text-center text-xs text-slate-400 dark:text-slate-600 uppercase tracking-widest font-bold">Tuner Active</p>
            </div>
        </div>
    </div>

    <script src="metronome.js"></script>
</body>
</html>
