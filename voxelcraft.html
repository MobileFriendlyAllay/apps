<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel Craft 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; background: #000; }
        canvas { display: block; cursor: crosshair; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 16px; height: 16px;
            border: 2px solid white; border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none; mix-blend-mode: difference;
            z-index: 10;
        }
        .hotbar-slot {
            width: 48px; height: 48px;
            border: 3px solid #444; background: rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: white; transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .hotbar-slot.selected { border-color: #22c55e; transform: scale(1.15); background: rgba(34, 197, 94, 0.2); }
        
        input[type=range] { -webkit-appearance: none; background: transparent; width: 100%; }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 8px; cursor: pointer; background: rgba(255,255,255,0.1); border-radius: 4px;
        }
        input[type=range]::-webkit-slider-thumb {
            height: 20px; width: 20px; border-radius: 50%; background: #22c55e; cursor: pointer; -webkit-appearance: none; margin-top: -6px;
        }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    <div id="ui-container" class="fixed inset-0 pointer-events-none flex flex-col justify-between p-6 z-20">
        <div class="flex justify-between items-start">
            <div class="bg-black/60 backdrop-blur-md p-4 rounded-xl text-white text-[10px] uppercase tracking-wider border border-white/10">
                <strong class="text-green-500 block mb-2 text-xs">Voxel Engine Alpha</strong>
                WASD - MOVE<br>SPACE - JUMP<br>SHIFT - SNEAK<br>L-CLICK - BREAK<br>R-CLICK - PLACE<br>SCROLL - SELECT ITEM<br>F11 / Fn+F11 - FULLSCREEN<br>ESC - PAUSE
            </div>
            <div id="fps-counter" class="text-white font-mono text-[10px] bg-black/60 backdrop-blur-md px-3 py-1 rounded-full border border-white/10">FPS: 0</div>
        </div>
        
        <div class="flex flex-col items-center gap-3 pb-4">
            <div id="item-label" class="text-white font-black uppercase tracking-[0.2em] text-[10px] bg-black/40 backdrop-blur-md px-4 py-1.5 rounded-full opacity-0 transition-opacity duration-300">Grass</div>
            <div class="flex justify-center gap-2 pointer-events-auto">
                <div id="slot-1" class="hotbar-slot selected" data-name="Grass">🌿</div>
                <div id="slot-2" class="hotbar-slot" data-name="Dirt">🟫</div>
                <div id="slot-3" class="hotbar-slot" data-name="Stone">🪨</div>
                <div id="slot-4" class="hotbar-slot" data-name="Wood">🪵</div>
                <div id="slot-5" class="hotbar-slot" data-name="Leaves">🍃</div>
            </div>
        </div>
    </div>
    
    <div id="pause-menu" class="fixed inset-0 bg-black/90 flex flex-col items-center justify-center gap-6 z-50">
        <h1 class="text-4xl font-black text-white mb-2 uppercase italic tracking-tighter">Game Paused</h1>
        
        <div class="w-64 space-y-3 bg-white/5 p-4 rounded-xl border border-white/10">
            <div class="flex justify-between items-center text-[10px] font-bold text-gray-400 uppercase tracking-widest">
                <span>Render Distance</span>
                <span id="render-val" class="text-green-500">35 Blocks</span>
            </div>
            <input type="range" id="render-slider" min="10" max="80" value="35" class="w-full">
        </div>

        <div class="flex flex-col gap-3">
            <button id="resume-btn" class="w-64 py-4 bg-green-500 hover:bg-green-400 text-black font-black rounded-xl transition-all active:scale-95 uppercase tracking-widest">Resume Game</button>
            <button id="export-btn" class="w-64 py-4 bg-white/5 hover:bg-white/10 text-white font-bold rounded-xl transition-all uppercase tracking-widest border border-white/10">Export Save</button>
            <label class="w-64 py-4 bg-white/5 hover:bg-white/10 text-white font-bold rounded-xl text-center cursor-pointer transition-all uppercase tracking-widest border border-white/10">
                Import Save
                <input type="file" id="import-input" class="hidden" accept=".json">
            </label>
        </div>
    </div>

    <script src="scripts/voxelcraft.js"></script>
</body>
</html>
